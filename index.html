<!DOCTYPE html>
<html lang="es">

<head>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="./admin/modules/css/loader-instructivo.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-89F6NB7TVR"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }

    gtag('js', new Date());

    gtag('config', 'G-89F6NB7TVR', {
      cookie_domain: 'auto'
    });
  </script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Catálogo de Productos</title>
  <meta property="og:title" content="Catálogo de Productos" />
  <meta property="og:description" content="Explorá nuestro catálogo actualizado de productos." />
  <meta property="og:image" content="https://cristianargentina.github.io/assets/img/catalogo-preview.jpg" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://cristianargentina.github.io/" />
  <meta property="fb:app_id" content="1302721282071710" />
  <meta name="twitter:card" content="summary_large_image">

</head>

<body>
  <div class="header-container">

    <div class="barra-superior">

      <h1 class="titulo-pagina">
        <i class="fas fa-shopping-cart icono-carrito"></i>
        Catálogo de Productos
      </h1>

      <div class="buscador-con-icono">
        <i class="fas fa-search"></i>
        <input type="text" id="buscador" placeholder="Buscar productos...">
      </div>

    </div>

    <div class="nav-categorias">

      <div class="nav-inner">

        <div class="categoria-item" data-id="belleza y salud">
          <span class="cat-icon">🧴</span>
          <span class="cat-text">Belleza y Salud</span>
        </div>

        <div class="categoria-item" data-id="hogar">
          <span class="cat-icon">🏠</span>
          <span class="cat-text">Hogar</span>
        </div>


        <div class="categoria-item" data-id="tecnologia">
          <span class="cat-icon">💻</span>
          <span class="cat-text">Tecnología</span>
        </div>

        <div class="categoria-item" data-id="iluminacion">
          <span class="cat-icon">💡</span>
          <span class="cat-text">Iluminación</span>
        </div>

        <div class="categoria-item active" data-id="">
          <span class="cat-icon">📦</span>
          <span class="cat-text">Todas</span>
        </div>

        <div class="categoria-indicator"></div>

      </div>

    </div>

  </div>
  <div id="instruccion">
    👉 Selecciona una categoría para explorar productos
  </div>
  <div class="productos" id="contenedor-productos">
  </div>
  <button id="cart-float" class="cart-float">
    <i class="fas fa-shopping-cart"></i>
    <span id="cart-count" class="cart-count">0</span>
  </button>


  <p id="no-results">No se encontraron productos que coincidan con la búsqueda o filtro.</p>
  <div id="cart-modal" class="cart-modal">
    <div class="cart-modal-content">
      <span id="cart-close" class="cart-close">×</span>
      <h2>Tu Carrito</h2>

      <div id="cart-items"></div>

      <div class="cart-footer">
        <strong id="cart-total-text">Total: $0</strong>
        <button id="btn-whatsapp" class="btn-whatsapp">
          Enviar consulta por WhatsApp
        </button>
      </div>

    </div>
  </div>
  <script type="module">
    import { API_URL } from './config.js';
    //import { initLoaderArt } from './admin/modules/js/loader-wake-up-backend.js';
    import { initLoaderInstructivo } from './admin/modules/js/loader-instructivo.js';

    // Variables DOM declaradas al inicio
    //   const loader = document.getElementById('loader-container');
    const hideLoader = initLoaderInstructivo();
    const contenedor = document.getElementById('contenedor-productos');
    const buscador = document.getElementById('buscador');
    const noResults = document.getElementById('no-results');
    let categorySelected = ''
    let carrito = [];

    /* 🧠 NUEVO ESTADO CENTRAL */
    const state = {
      productos: []
    };

    const domCache = new Map();

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        const iframe = entry.target;

        if (entry.isIntersecting) {
          iframe.src = iframe.dataset.src;
          iniciarPlaylist(iframe);
        } else {
          iframe.src = "";
          detenerPlaylist(iframe);
        }
      });
    }, { threshold: 0.6 });

    function iniciarPlaylist(iframe) {
      if (iframe._interval) return;

      const ids = iframe.dataset.ids.split(',');
      let index = 0;

      iframe._interval = setInterval(() => {
        index = (index + 1) % ids.length;

        iframe.src = `https://www.youtube-nocookie.com/embed/${ids[index]}?autoplay=1&mute=1&controls=0`;
      }, 6000);
    }

    function detenerPlaylist(iframe) {
      if (iframe._interval) {
        clearInterval(iframe._interval);
        iframe._interval = null;
      }
    }

    const modal = document.getElementById("cart-modal");
    const closeBtn = document.getElementById("cart-close");

    closeBtn.addEventListener("click", () => {
      modal.style.display = "none";
    });

    modal.addEventListener("click", (e) => {
      if (e.target === modal) {
        modal.style.display = "none";
      }
    });
    const categorias = document.querySelectorAll(".categoria-item");
    const indicator = document.querySelector(".categoria-indicator");

    function moverIndicador(elemento) {

      const nav =
        document.querySelector(".nav-inner");

      const navRect =
        nav.getBoundingClientRect();

      const elRect =
        elemento.getBoundingClientRect();

      const left =
        elRect.left - navRect.left;

      indicator.style.width =
        elRect.width + "px";

      indicator.style.transform =
        `translateX(${left}px)`;

    }

    categorias.forEach(cat => {

      cat.addEventListener("click", () => {

        categorias.forEach(c =>
          c.classList.remove("active")
        );

        cat.classList.add("active");

        moverIndicador(cat);

        // 🔥 centrar en mobile
        if (window.innerWidth <= 600) {
          cat.scrollIntoView({
            behavior: "smooth",
            inline: "center",
            block: "nearest"
          });
        }

        categorySelected = cat.dataset.id;

        document
          .getElementById("instruccion")
          .style.display = "none";

        aplicarFiltro()

        // actualizar URL
        const url =
          new URL(window.location);

        if (cat.dataset.id) {
          url.searchParams.set(
            "cat",
            cat.dataset.id
          );
        } else {
          url.searchParams.delete("cat");
        }

        window.history.replaceState(
          {},
          "",
          url
        );
      });

    });

    buscador.addEventListener('input', aplicarFiltro);

    async function cargarProductosDesdeJSON() {
      const res = await fetch('/assets/csv/productosactuales.json');
      if (!res.ok) throw new Error('No se pudo cargar JSON local');
      return await res.json();
    }

    function normalizarProducto(p) {
      return {
        ...p,
        image: p.image || null,
        videos: Array.isArray(p.videos) ? p.videos : [],
        stock: Number(p.stock) || 0,
        price: Number(p.price) || 0
      };
    }

    async function actualizarDesdeBackend() {
      try {
        const res = await fetch(`${API_URL}/products`);
        if (!res.ok) throw new Error('Backend no disponible');

        const productos = await res.json();

        setProductos(productos.map(normalizarProducto));

        console.info("Backend aplicado sin re-render");
      } catch {
        console.warn("Backend dormido");
      }
    }

    const cartBtn = document.getElementById("cart-float");
    const cartCount = document.getElementById("cart-count");

    function actualizarContador() {
      cartCount.textContent = carrito.length;
    }

    document.addEventListener("change", (e) => {
      if (e.target.classList.contains("producto-check")) {
        actualizarContador();
      }
    });

    document.addEventListener("click", (e) => {
      const btn = e.target.closest(".btn-agregar");
      if (!btn) return;

      const item = {
        id: btn.dataset.id,
        nombre: btn.dataset.nombre,
        precio: Number(btn.dataset.precio)
      };

      carrito.push(item);
      renderCarrito();
      actualizarContador();

      // efecto visual opcional
      btn.textContent = "Agregado ✓";
      btn.classList.add("agregado");

      setTimeout(() => {
        btn.textContent = "Agregar";
        btn.classList.remove("agregado");
      }, 800);
    });

    const cartItemsContainer = document.getElementById("cart-items");
    const cartTotalText = document.getElementById("cart-total-text");

    function renderCarrito() {
      cartItemsContainer.innerHTML = "";

      carrito.forEach((item, index) => {
        const div = document.createElement("div");
        div.className = "cart-item";

        div.innerHTML = `
      <span>${item.nombre} - $${item.precio.toLocaleString()}</span>
      <button data-index="${index}">Eliminar</button>
    `;

        cartItemsContainer.appendChild(div);
      });

      const total = carrito.reduce((acc, p) => acc + p.precio, 0);
      cartTotalText.textContent = "Total: $" + total.toLocaleString();

      actualizarContador();
    }

    cartItemsContainer.addEventListener("click", (e) => {
      const btn = e.target.closest("button");
      if (!btn) return;

      const index = btn.dataset.index;

      carrito.splice(index, 1);

      renderCarrito();
    });

    cartBtn.addEventListener("click", () => {
      modal.style.display = "flex";
      renderCarrito();
    });

    const btnWhatsapp = document.getElementById("btn-whatsapp");

    // ⚠️ CAMBIÁ ESTE NÚMERO POR EL TUYO
    const numeroWhatsapp = "5491138863899";

    btnWhatsapp.addEventListener("click", () => {
      if (carrito.length === 0) {
        alert("El carrito está vacío");
        return;
      }

      const detalle = carrito
        .map(p => `• ${p.nombre} - $${p.precio.toLocaleString()}`)
        .join("\n");

      const total = carrito.reduce((acc, p) => acc + p.precio, 0);

      const mensaje =
        `Hola, quiero consultar por los siguientes productos:

${detalle}

Total: $${total.toLocaleString()}`;

      const url = `https://wa.me/${numeroWhatsapp}?text=${encodeURIComponent(mensaje)}`;

      window.open(url, "_blank");
    });

    function crearProductoElem(p) {
      const key = p.id || p.name;

      if (domCache.has(key)) return domCache.get(key);

      const div = document.createElement('div');
      div.className = 'producto' +
        (p.stock <= 0 ? ' agotado' : '');
      div.dataset.key = key;

      if (p.image) {
        const imgWrapper = document.createElement('div');
        imgWrapper.className = 'img-wrapper';

        const img = document.createElement('img');
        img.src = p.image;
        img.loading = "lazy";

        imgWrapper.appendChild(img);

        if (p.stock <= 0) {
          const marca = document.createElement('div');
          marca.className = 'marca-agua';
          marca.textContent = 'AGOTADO';
          imgWrapper.appendChild(marca);
        }

        div.appendChild(imgWrapper);
      }

      if (p.videos && p.videos.length > 0) {
        const container = document.createElement('div');
        container.className = 'video-container';

        const iframe = document.createElement('iframe');
        iframe.dataset.ids = p.videos.join(',');

        iframe.dataset.src = `https://www.youtube-nocookie.com/embed/${p.videos[0]}?autoplay=1&mute=1&controls=0`;

        iframe.allow = "autoplay; encrypted-media";
        iframe.frameBorder = "0";

        container.appendChild(iframe);
        div.appendChild(container);

        div.classList.add("producto-video");

        observer.observe(iframe);
      }

      const info = document.createElement('div');
      info.className = 'info';

      const btnDisabled = p.stock <= 0 ? 'disabled' : '';

      info.innerHTML = `
    <h2>${p.name}</h2>
    <p>${p.description}</p>
    <div class="precio-carrito">
      <span class="precio">$${p.price.toLocaleString()}</span>
      <button class="btn-agregar"
        ${btnDisabled}
        data-id="${key}"
        data-nombre="${p.name}"
        data-precio="${p.price}">
        ${p.stock <= 0 ? 'Sin stock' : 'Agregar'}
      </button>
    </div>
  `;

      div.appendChild(info);

      domCache.set(key, div);
      return div;
    }

    function cambioProducto(a, b) {
      return (
        a.name !== b.name ||
        a.description !== b.description ||
        a.price !== b.price ||
        a.stock !== b.stock ||
        a.image !== b.image
      );
    }

    function actualizarProductoDOM(key, prev, next) {
      const el = domCache.get(key);
      if (!el) return;

      el.querySelector("h2").textContent = next.name;
      el.querySelector("p").textContent = next.description;
      el.querySelector(".precio").textContent =
        "$" + next.price.toLocaleString();

      el.classList.toggle("agotado", next.stock <= 0);

      const btn = el.querySelector(".btn-agregar");
      if (btn) {
        const sinStock = next.stock <= 0;

        btn.disabled = sinStock;
        btn.textContent = sinStock ? "Sin stock" : "Agregar";
      }

      if (prev.image !== next.image) {
        const img = el.querySelector("img");
        if (img) img.src = next.image;
      }

      if (prev.videos.join() !== next.videos.join()) {
        const iframe = el.querySelector("iframe");

        if (iframe) {
          iframe.dataset.ids = next.videos.join(',');
          iframe.dataset.src = `https://www.youtube-nocookie.com/embed/${next.videos[0]}?autoplay=1&mute=1&controls=0`;
        }
      }

      let marca = el.querySelector(".marca-agua");

      if (next.stock <= 0) {
        if (!marca) {
          marca = document.createElement("div");
          marca.className = "marca-agua";
          marca.textContent = "AGOTADO";
          el.querySelector(".img-wrapper")?.appendChild(marca);
        }
      } else {
        if (marca) marca.remove();
      }
      el.dataset.categoria = next.category || "";
    }

    function setProductos(nuevos) {
      const prevMap = new Map(state.productos.map(p => [p.id || p.name, p]));
      const nuevosKeys = new Set(nuevos.map(p => p.id || p.name));

      state.productos = nuevos;

      nuevos.forEach(p => {
        const key = p.id || p.name;
        const prev = prevMap.get(key);

        if (!prev) {
          const el = crearProductoElem(p);
          contenedor.appendChild(el);
          return;
        }

        if (cambioProducto(prev, p)) {
          actualizarProductoDOM(key, prev, p);
        }
      });

      prevMap.forEach((_, key) => {
        if (!nuevosKeys.has(key)) {
          const el = domCache.get(key);
          if (el) el.remove();
          domCache.delete(key);
        }
      });
      ordenarDOM();
      aplicarFiltro();
    }

    function aplicarFiltro() {
      const texto = buscador.value.toLowerCase();

      let visibles = 0;

      state.productos.forEach(p => {
        const key = p.id || p.name;
        const el = domCache.get(key);

        const matchTexto =
          `${p.name} ${p.description}`.toLowerCase().includes(texto);

        const matchCategoria =
          !categorySelected ||
          (p.category || '').toLowerCase() === categorySelected.toLowerCase();

        const visible = matchTexto && matchCategoria;

        el.style.display = visible ? "" : "none";
        if (visible) visibles++;
      });

      noResults.style.display = visibles === 0 ? 'block' : 'none';
    }

    function ordenarDOM() {
      const ordenados = [...state.productos].sort((a, b) => {
        if (a.stock === 0 && b.stock !== 0) return 1;
        if (b.stock === 0 && a.stock !== 0) return -1;
        return a.price - b.price;
      });

      ordenados.forEach(p => {
        const key = p.id || p.name;
        const el = domCache.get(key);
        contenedor.appendChild(el); // 🔥 mueve sin recrear
      });
    }


    /*
                <a class="whatsapp-btn"
                  href="https://wa.me/5491138863899?text=Hola,%20quiero%20consultar%20por%20el%20producto:%20${encodeURIComponent(p.name)}" 
                  target="_blank" 
                  title="Consultar por WhatsApp">
                  <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp" style="height: 36px;">
                </a>
    */

    window.addEventListener("load", () => {

      const params = new URLSearchParams(window.location.search);
      const catUrl = params.get("cat");

      if (catUrl) {

        const categorias =
          document.querySelectorAll(".categoria-item");

        categorias.forEach(cat => {

          if (
            cat.dataset.id.toLowerCase()
            === catUrl.toLowerCase()
          ) {

            categorias.forEach(c =>
              c.classList.remove("active")
            );

            cat.classList.add("active");

            moverIndicador(cat);

            categorySelected =
              cat.dataset.id;

            document
              .getElementById("instruccion")
              .style.display = "none";

            aplicarFiltro();

          }

        });

      } else {

        const activa =
          document.querySelector(".categoria-item.active");

        if (activa)
          moverIndicador(activa);

      }

    });

    window.addEventListener("resize", () => {

      const activa =
        document.querySelector(".categoria-item.active");

      if (activa)
        moverIndicador(activa);

    });

    (async () => {
      const productos = await cargarProductosDesdeJSON();
      setProductos(productos.map(normalizarProducto));

      hideLoader();

      actualizarDesdeBackend();
    })();

  </script>
</body>

</html>
