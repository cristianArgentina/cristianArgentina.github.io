<html lang="es">

<body>
  <div class="header-container">

    <div class="barra-superior">

      <h1 class="titulo-pagina">
        <i class="fas fa-shopping-cart icono-carrito"></i>
        Catálogo de Productos
      </h1>

      <div class="buscador-con-icono">
        <i class="fas fa-search"></i>
        <input type="text" id="buscador" placeholder="Buscar productos...">
      </div>

    </div>

    <div class="nav-categorias">

      <div class="categoria-item" data-id="belleza y salud">
        🧴 Belleza y Salud
      </div>

      <div class="categoria-item" data-id="hogar">
        🏠 Hogar
      </div>

      <div class="categoria-item" data-id="tecnologia">
        💻 Tecnología
      </div>

      <div class="categoria-item" data-id="iluminacion">
        💡 Iluminación
      </div>

      <div class="categoria-item active" data-id="">
        📦 Todas
      </div>

      <div class="categoria-indicator"></div>

    </div>

  </div>
  <div id="instruccion">
    👉 Selecciona una categoría para explorar productos
  </div>
  <div class="productos" id="contenedor-productos">
  </div>
  <button id="cart-float" class="cart-float">
    <i class="fas fa-shopping-cart"></i>
    <span id="cart-count" class="cart-count">0</span>
  </button>


  <p id="no-results">No se encontraron productos que coincidan con la búsqueda o filtro.</p>
  <div id="cart-modal" class="cart-modal">
    <div class="cart-modal-content">
      <span id="cart-close" class="cart-close">×</span>
      <h2>Tu Carrito</h2>

      <div id="cart-items"></div>

      <div class="cart-footer">
        <strong id="cart-total-text">Total: $0</strong>
        <button id="btn-whatsapp" class="btn-whatsapp">
          Enviar consulta por WhatsApp
        </button>
      </div>

    </div>
  </div>
  <script type="module">
    import { API_URL } from './config.js';
    //import { initLoaderArt } from './admin/modules/js/loader-wake-up-backend.js';
    import { initLoaderInstructivo } from './admin/modules/js/loader-instructivo.js';

    // Variables DOM declaradas al inicio
    //   const loader = document.getElementById('loader-container');
    const hideLoader = initLoaderInstructivo();
    const contenedor = document.getElementById('contenedor-productos');
    const buscador = document.getElementById('buscador');
    const noResults = document.getElementById('no-results');
    let categorySelected = ''
    let carrito = [];

    // Lista de productos original para filtrado
    /*let productosOriginales = [];*/
    let productosDatos = [];
    let productosElems = [];
    /*
    function mostrarLoader() {
      loader.style.display = "flex";
    }
    function ocultarLoader() {
      loader.style.display = "none";
    }
*/

    const modal = document.getElementById("cart-modal");
    const closeBtn = document.getElementById("cart-close");

    closeBtn.addEventListener("click", () => {
      modal.style.display = "none";
    });

    modal.addEventListener("click", (e) => {
      if (e.target === modal) {
        modal.style.display = "none";
      }
    });
    const categorias = document.querySelectorAll(".categoria-item");
    const indicator = document.querySelector(".categoria-indicator");

    function moverIndicador(elemento) {

      const rect = elemento.getBoundingClientRect();

      const parentRect =
        elemento.parentElement.getBoundingClientRect();

      const scrollLeft =
        elemento.parentElement.scrollLeft;

      const left =
        rect.left - parentRect.left + scrollLeft;

      indicator.style.width =
        rect.width + "px";

      indicator.style.transform =
        `translateX(${left}px)`;

    }

    categorias.forEach(cat => {

      cat.addEventListener("click", () => {

        categorias.forEach(c =>
          c.classList.remove("active")
        );

        cat.classList.add("active");

        moverIndicador(cat);

        categorySelected = cat.dataset.id;

        document
          .getElementById("instruccion")
          .style.display = "none";

        filtrarYOrdenar(productosDatos);

      });

    });

    buscador.addEventListener('input', () => filtrarYOrdenar(/*productosOriginales*/productosDatos));

    async function cargarProductosDesdeJSON() {
      const res = await fetch('/assets/csv/productosactuales.json');
      if (!res.ok) throw new Error('No se pudo cargar JSON local');
      return await res.json();
    }

    function normalizarProducto(p) {
      return {
        ...p,
        image: p.image || null,
        videos: Array.isArray(p.videos) ? p.videos : [],
        stock: Number(p.stock) || 0,
        price: Number(p.price) || 0
      };
    }

    async function precargarProductos() {
      try {
        const productos = await cargarProductosDesdeJSON();
        /*productosOriginales = productos.map(p => crearProductoElem(normalizarProducto(p)));*/
        productosDatos = productos.map(normalizarProducto)
      } catch (e) {
        console.error(e);
        noResults.textContent = 'Error al cargar productos locales.';
        noResults.style.display = 'block';
      }
    }

    /*
        async function precargarProductos() {
          try {
            const res = await fetch(`${API_URL}/products`);
            if (!res.ok) throw new Error('Error en la respuesta de la API');
            const productos = await res.json();
            //  setTimeout(() => {
            hideLoader();
            //  }, 9900); // un mini delay para que se note
    
            const productosElems = productos.map(p => crearProductoElem(p));
            productosOriginales = [...productosElems];
    
          } catch (err) {
            console.error("Error al despertar backend", err);
            noResults.textContent = 'Error al cargar los productos.';
            noResults.style.display = 'block';
            hideLoader();
          }
        }
    */
    async function actualizarDesdeBackend() {
      try {
        const res = await fetch(`${API_URL}/products`);
        if (!res.ok) throw new Error('Backend no disponible');

        const productos = await res.json();

        renderProductosDesdeDatos(productos);

        // 🔴 RE-RENDER SIEMPRE
        filtrarYOrdenar(/*productosOriginales*/productosDatos);

        console.info('Productos actualizados desde backend');

      } catch (err) {
        console.warn('Backend aún dormido');
      }
    }

    function renderProductosDesdeDatos(productos) {
      /* productosOriginales = productos.map(p =>
         crearProductoElem(normalizarProducto(p))
       );*/
      productosDatos = productos.map(normalizarProducto)
      productosElems = productosDatos.map(crearProductoElem)
    }

    (async () => {
      // 2️⃣ Cargar json inmediatamente
      await precargarProductos();

      // 3️⃣ Ocultar loader (no depende del backend)
      hideLoader();

      filtrarYOrdenar(/*productosOriginales*/productosDatos);

      // 4️⃣ Backend en segundo plano
      actualizarDesdeBackend();
    })();
    /*
        const wspBtn = document.getElementById("whatsapp-float");
    
        wspBtn.addEventListener("click", () => {
          const seleccionados = [...document.querySelectorAll(".producto-check:checked")]
            .map(chk => chk.dataset.nombre);
    
          if (seleccionados.length === 0) {
            alert("Selecciona al menos un producto para consultar");
            return;
          }
    
          const mensaje = `Hola, me interesan los siguientes productos:\n- ${seleccionados.join("\n- ")}`;
          const url = `https://wa.me/5491138863899?text=${encodeURIComponent(mensaje)}`;
    
          window.open(url, "_blank");
        });
    */

    const cartBtn = document.getElementById("cart-float");
    const cartCount = document.getElementById("cart-count");

    function actualizarContador() {
      cartCount.textContent = carrito.length;
    }



    document.addEventListener("change", (e) => {
      if (e.target.classList.contains("producto-check")) {
        actualizarContador();
      }
    });

    document.addEventListener("click", (e) => {
      const btn = e.target.closest(".btn-agregar");
      if (!btn) return;

      const item = {
        id: btn.dataset.id,
        nombre: btn.dataset.nombre,
        precio: Number(btn.dataset.precio)
      };

      carrito.push(item);
      renderCarrito();
      actualizarContador();

      // efecto visual opcional
      btn.textContent = "Agregado ✓";
      btn.classList.add("agregado");

      setTimeout(() => {
        btn.textContent = "Agregar";
        btn.classList.remove("agregado");
      }, 800);
    });

    const cartItemsContainer = document.getElementById("cart-items");
    const cartTotalText = document.getElementById("cart-total-text");

    function renderCarrito() {
      cartItemsContainer.innerHTML = "";

      carrito.forEach((item, index) => {
        const div = document.createElement("div");
        div.className = "cart-item";

        div.innerHTML = `
      <span>${item.nombre} - $${item.precio.toLocaleString()}</span>
      <button data-index="${index}">Eliminar</button>
    `;

        cartItemsContainer.appendChild(div);
      });

      const total = carrito.reduce((acc, p) => acc + p.precio, 0);
      cartTotalText.textContent = "Total: $" + total.toLocaleString();

      actualizarContador();
    }

    cartItemsContainer.addEventListener("click", (e) => {
      const btn = e.target.closest("button");
      if (!btn) return;

      const index = btn.dataset.index;

      carrito.splice(index, 1);

      renderCarrito();
    });

    cartBtn.addEventListener("click", () => {
      modal.style.display = "flex";
      renderCarrito();
    });

    const btnWhatsapp = document.getElementById("btn-whatsapp");

    // ⚠️ CAMBIÁ ESTE NÚMERO POR EL TUYO
    const numeroWhatsapp = "5491138863899";

    btnWhatsapp.addEventListener("click", () => {
      if (carrito.length === 0) {
        alert("El carrito está vacío");
        return;
      }

      const detalle = carrito
        .map(p => `• ${p.nombre} - $${p.precio.toLocaleString()}`)
        .join("\n");

      const total = carrito.reduce((acc, p) => acc + p.precio, 0);

      const mensaje =
        `Hola, quiero consultar por los siguientes productos:

${detalle}

Total: $${total.toLocaleString()}`;

      const url = `https://wa.me/${numeroWhatsapp}?text=${encodeURIComponent(mensaje)}`;

      window.open(url, "_blank");
    });

    // Carga de YouTube
    const tag = document.createElement('script');
    document.body.appendChild(tag);

    function crearProductoElem(p) {
      const div = document.createElement('div');
      div.className = 'producto' + (p.videos.length > 0 ? ' producto-video' : '') + (p.stock <= 0 ? ' agotado' : '');
      div.dataset.categoria = p.category;
      div.dataset.precio = p.price;
      div.dataset.stock = p.stock;
      if (p.videos.length > 0) div.dataset.videos = p.videos.join(',');

      if (p.videos.length > 0) {
        const vidCont = document.createElement('div');
        vidCont.className = 'video-container';
        div.appendChild(vidCont);
      } else if (p.image) {
        const imgWrapper = document.createElement('div');
        imgWrapper.className = 'img-wrapper';
        imgWrapper.innerHTML = `
          <img src="${p.image}" alt="${p.name}">
          ${p.stock <= 0 ? '<div class="marca-agua">AGOTADO</div>' : ''}
          `;
        div.appendChild(imgWrapper);
      }

      const info = document.createElement('div');
      info.className = 'info';
      info.innerHTML = `
          <h2>${p.name}</h2>
          <p>${p.description}</p>
          <div class="precio-carrito">
            <span class="precio">$${p.price.toLocaleString()}</span>
            <button class="btn-agregar"
              data-id="${p.id || p.name}"
              data-nombre="${p.name}"
              data-precio="${p.price}">
              Agregar
            </button>
          </div>
        `;
      div.appendChild(info);
      // Alerta visual de stock bajo
      if (p.stock > 0) {
        const stockAlert = document.createElement('div');
        stockAlert.className = 'stock-alert';

        if (p.stock <= 2) {
          stockAlert.textContent = '¡Últimas unidades!';
          stockAlert.classList.add('stock-bajo');
        } else {
          stockAlert.textContent = 'Disponible';
          stockAlert.classList.add('stock-alto');
        }

        div.appendChild(stockAlert);
      }
      return div;
    }

    /*
                <a class="whatsapp-btn"
                  href="https://wa.me/5491138863899?text=Hola,%20quiero%20consultar%20por%20el%20producto:%20${encodeURIComponent(p.name)}" 
                  target="_blank" 
                  title="Consultar por WhatsApp">
                  <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp" style="height: 36px;">
                </a>
    */

    function filtrarYOrdenar(productosDatos) {
      const texto = buscador.value.toLowerCase();

      let lista = productosDatos;

      if (categorySelected) {
        lista = lista.filter(p =>
          (p.category || '').toLowerCase() === categorySelected.toLowerCase()
        );
      }

      lista = lista.filter(p =>
        `${p.name} ${p.description}`.toLowerCase().includes(texto)
      );

      const ordenados = [...lista].sort((a, b) => {

        const stockA = Number(a.stock);
        const stockB = Number(b.stock);

        // agotados al final
        if (stockA === 0 && stockB !== 0) return 1;
        if (stockB === 0 && stockA !== 0) return -1;

        return Number(a.price) - Number(b.price);
      });

      contenedor.innerHTML = "";

      ordenados
        .map(crearProductoElem)
        .forEach(e => contenedor.appendChild(e));

      if (window.inicializarVideosYouTube)
        inicializarVideosYouTube();

      noResults.style.display = ordenados.length === 0 ? 'block' : 'none';
    }

    window.addEventListener("load", () => {

      const activa =
        document.querySelector(".categoria-item.active");

      if (activa) {

        setTimeout(() => {
          moverIndicador(activa);
        }, 50);

      }

    });

    window.inicializarVideosYouTube = () => {

      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {

          const iframe = entry.target;

          if (entry.isIntersecting) {
            // ▶️ reproducir
            iframe.src = iframe.dataset.src;

            // ▶️ iniciar loop manual
            iniciarPlaylist(iframe);

          } else {
            // ⏸ pausar y limpiar
            iframe.src = "";
            detenerPlaylist(iframe);
          }

        });
      }, {
        threshold: 0.6
      });

      function iniciarPlaylist(iframe) {

        if (iframe._interval) return;

        const ids = iframe.dataset.ids.split(',');
        let index = 0;

        iframe._interval = setInterval(() => {
          index = (index + 1) % ids.length;

          iframe.src = `https://www.youtube-nocookie.com/embed/${ids[index]}?autoplay=1&mute=1&controls=0`;

        }, 6000); // ⏱ duración aproximada (ajustable)
      }

      function detenerPlaylist(iframe) {
        if (iframe._interval) {
          clearInterval(iframe._interval);
          iframe._interval = null;
        }
      }

      document.querySelectorAll('.producto-video').forEach((prod) => {

        if (prod.dataset.videoReady) return;

        const raw = prod.dataset.videos;
        if (!raw) return;

        const ids = raw.split(',');

        const container = prod.querySelector('.video-container');

        const iframe = document.createElement('iframe');

        iframe.dataset.ids = ids.join(',');

        iframe.dataset.src = `https://www.youtube-nocookie.com/embed/${ids[0]}?autoplay=1&mute=1&controls=0`;

        iframe.allow = "autoplay; encrypted-media";
        iframe.frameBorder = "0";

        container.appendChild(iframe);

        observer.observe(iframe);

        prod.dataset.videoReady = true;

      });
    };
  </script>
</body>
