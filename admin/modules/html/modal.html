<!-- Modal Venta -->
<div id="modalVenta" class="modal">
  <div class="modal-content">
    <span id="closeModalVenta" class="close">&times;</span>
    <h2>Registrar Venta</h2>
    <form id="formVenta">
      <label>Producto:</label>
      <select id="ventaProducto" required></select>

      <label>Cantidad:</label>
      <input type="number" id="ventaCantidad" required min="1">

      <label>Precio de venta unitario:</label>
      <input type="number" id="ventaPrecio" required step="0.01">

      <button type="submit" class="btn-primary">💾 Guardar</button>
    </form>
  </div>
</div>

<div id="modalNuevoProducto" class="modal">
  <div class="modal-content">
    <span class="close">&times;</span>
    <h2>➕ Nuevo Producto</h2>
    <form id="formNuevoProducto">
      <label for="nuevoNombre">Nombre:</label>
      <input type="text" id="nuevoNombre" name="nombre" required>

      <label for="nuevoDescripcion">Descripción:</label>
      <textarea id="nuevoDescripcion" name="descripcion" required></textarea>

      <label for="nuevoPrecio">Precio:</label>
      <input type="number" id="nuevoPrecio" name="precio" required step="0.01">

      <label for="nuevoStock">Stock:</label>
      <input type="number" id="nuevoStock" name="stock" required min="0">

      <label for="nuevoCategoria">Categoría:</label>
      <select id="nuevoCategoria" name="categoria" required>
        <option value="belleza y salud">Belleza y Salud</option>
        <option value="hogar">Hogar</option>
        <option value="tecnologia">Tecnología</option>
        <option value="iluminacion">Iluminación</option>
      </select>

      <label>
        <input type="checkbox" id="esCombo">
        Este producto es un combo
      </label>

      <div id="comboBuilder" style="display:none; margin-top:10px;">
        <h4>Productos del combo</h4>
        <div id="comboItems"></div>
        <button type="button" id="btnAgregarProductoCombo">➕ Agregar producto</button>
      </div>

      <label for="nuevoUrlImage">URL Imagen:</label>
      <input type="text" id="nuevoUrlImage" name="urlImage">

      <button type="submit" class="btn-primary">💾 Guardar</button>
    </form>
  </div>
</div>


<div id="modalEditarProducto" class="modal">
  <div class="modal-content">
    <span class="close">&times;</span>
    <h2>✏️ Editar Producto</h2>
    <form id="formEditarProducto">
      <input type="hidden" name="productoId">

      <label for="editarNombre">Nombre:</label>
      <input type="text" id="editarNombre" name="nombre" required>

      <label for="editarDescripcion">Descripción:</label>
      <textarea id="editarDescripcion" name="descripcion" required></textarea>

      <label for="editarPrecio">Precio:</label>
      <input type="number" id="editarPrecio" name="precio" required step="0.01">

      <label for="editarStock">Stock:</label>
      <input type="number" id="editarStock" name="stock" required min="0">

      <label for="editarCategoria">Categoría:</label>
      <select id="editarCategoria" name="categoria" required>
        <option value="belleza y salud">Belleza y Salud</option>
        <option value="hogar">Hogar</option>
        <option value="tecnologia">Tecnología</option>
        <option value="iluminacion">Iluminación</option>
      </select>

      <label for="editarUrlImage">URL Imagen:</label>
      <input type="text" id="editarUrlImage" name="urlImage">
      <h3>Lotes del producto</h3>
      <div id="editarLotesWrapper">
        <table class="tabla-lotes">
          <thead>
            <tr>
              <th>Fecha Ingreso</th>
              <th>Unidades</th>
              <th>Costo Unitario</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="editarLotes">
            <!-- filas dinámicas -->
          </tbody>
        </table>
      </div>
      <button type="submit" class="btn-primary">Actualizar</button>
    </form>
  </div>
</div>


<div id="modalLote" class="modal">
  <div class="modal-content">
    <span class="close">&times;</span>
    <h2>➕ Agregar Lote</h2>
    <form id="formLote">
      <input type="hidden" name="loteProductoId" id="loteProductoId">

      <label for="loteFecha">Fecha Ingreso:</label>
      <input type="date" id="loteFecha" name="fecha" required>

      <label for="loteUnidades">Unidades:</label>
      <input type="number" id="loteUnidades" name="unidades" required min="1">

      <label for="loteCosto">Costo Unitario:</label>
      <input type="number" id="loteCosto" name="costoUnitario" required step="0.01">

      <button type="submit" class="btn-primary">Guardar</button>
    </form>
  </div>
</div>

<div id="modalEntrega" class="modal">

  <div class="modal-content">

    <span class="close">&times;</span>

    <form id="formEntrega">

      <input placeholder="Contacto" name="contacto">
      <input placeholder="Lugar" name="lugares">
      <input placeholder="Fecha" name="fecha">
      <input placeholder="Horario" name="hora">
      <input placeholder="Productos" name="productos">

      <select name="canal">
        <option value="">Canal</option>
        <option value="whatsapp">WhatsApp</option>
        <option value="messenger">Messenger</option>
      </select>

      <button type="submit">Guardar</button>

    </form>

  </div>

</div>
